<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ChessRPG</title>
<link rel="stylesheet"
      href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 560px;
    margin: 24px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 { margin-bottom: 4px; }
  #board { width: 480px; margin: 16px 0; }
  #status {
    padding: 10px 12px;
    background: #f3f3f3;
    border-radius: 6px;
    margin: 12px 0;
    min-height: 1.4em;
  }
  button {
    padding: 8px 14px;
    font-size: 14px;
    border: 1px solid #888;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #history {
    font-family: ui-monospace, monospace;
    font-size: 13px;
    white-space: pre-wrap;
    background: #fafafa;
    border: 1px solid #eee;
    padding: 8px;
    border-radius: 4px;
    max-height: 160px;
    overflow-y: auto;
  }
  .meta { color: #555; font-size: 13px; }

  #waiting {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin: 12px 0;
    background: linear-gradient(90deg, #f6f7fb, #eef1ff, #f6f7fb);
    background-size: 200% 100%;
    border: 1px solid #d8def0;
    border-radius: 8px;
    animation: waitingShimmer 2.4s linear infinite;
  }
  #waiting.on { display: flex; }
  #waitingPiece {
    font-size: 34px;
    line-height: 1;
    animation: waitingBounce 1.1s cubic-bezier(.5,0,.5,1) infinite;
    transform-origin: 50% 100%;
  }
  #waitingLabel { font-size: 15px; color: #333; }
  #waitingDots::after {
    content: '';
    display: inline-block;
    width: 1.4em;
    text-align: left;
    animation: waitingDots 1.2s steps(4, end) infinite;
  }
  @keyframes waitingBounce {
    0%, 100% { transform: translateY(0) scale(1, 1); }
    40%      { transform: translateY(-12px) scale(0.96, 1.04); }
    70%      { transform: translateY(0) scale(1.06, 0.94); }
  }
  @keyframes waitingDots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }
  @keyframes waitingShimmer {
    0%   { background-position: 0% 0; }
    100% { background-position: -200% 0; }
  }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.18s ease-out;
  }
  .modal-overlay.on { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    padding: 28px 32px 24px;
    min-width: 300px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
    text-align: center;
    animation: popIn 0.22s ease-out;
  }
  .modal h2 { margin: 0 0 8px; font-size: 22px; }
  .modal-message { color: #444; margin: 0 0 16px; }
  .modal-sub { font-size: 13px; color: #666; margin: 12px 0 0; min-height: 1.2em; }
  .modal-buttons { display: flex; gap: 10px; justify-content: center; }
  .modal-close {
    position: absolute; top: 6px; right: 8px;
    background: transparent; border: none;
    font-size: 24px; line-height: 1;
    cursor: pointer; color: #888;
    padding: 4px 10px; margin: 0;
  }
  .modal-close:hover { color: #222; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  #setup {
    margin: 14px 0;
    padding: 12px 14px;
    border: 1px solid #d8def0;
    border-radius: 8px;
    background: #fbfbfd;
  }
  #setup h3 { margin: 0 0 8px; font-size: 15px; }
  #setup .setup-hint { font-size: 12px; color: #666; margin-bottom: 8px; }
  .setup-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
  }
  .setup-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 2px;
    background: #fff;
    border: 1px solid #e1e4ea;
    border-radius: 5px;
  }
  .setup-cell img { width: 32px; height: 32px; }
  .setup-cell .slot-label { font-size: 10px; color: #666; margin-top: 2px; }
  .setup-cell input {
    width: 44px;
    margin-top: 3px;
    padding: 2px 4px;
    font-size: 12px;
    text-align: center;
    border: 1px solid #c4c8d2;
    border-radius: 3px;
  }
  .setup-actions { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .setup-actions button { margin: 0; }

  #stats {
    margin: 14px 0;
    padding: 10px 12px;
    border: 1px solid #e1e4ea;
    border-radius: 6px;
    background: #fff;
    display: none;
  }
  #stats.on { display: block; }
  #stats h3 { margin: 0 0 6px; font-size: 14px; }
  .stats-list {
    font-family: ui-monospace, monospace;
    font-size: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 14px;
  }
  .stats-list .row { display: flex; gap: 6px; align-items: center; }
  .stats-list img { width: 18px; height: 18px; }
  .stats-list .sq { color: #888; min-width: 22px; }
  .stats-list .lvl { color: #4a6cd4; }
  .stats-list .hp { color: #2a8f3f; }
  .stats-list .dmg { color: #c14a3a; }

  #pieceTooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 22, 30, 0.94);
    color: #fff;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    padding: 6px 9px;
    border-radius: 5px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    z-index: 1500;
    display: none;
    white-space: nowrap;
  }
  #pieceTooltip.on { display: block; }
  #pieceTooltip .tt-row { display: flex; gap: 8px; }
  #pieceTooltip .tt-lvl { color: #8fb4ff; }
  #pieceTooltip .tt-hp { color: #6fe08c; }
  #pieceTooltip .tt-dmg { color: #ff8a78; }

  .promo-choices { display: flex; gap: 8px; }
  .promo-btn {
    width: 64px; height: 64px;
    padding: 4px;
    border: 2px solid transparent;
    border-radius: 6px;
    background: #f3f3f3;
    cursor: pointer;
    margin: 0;
    transition: border-color 0.12s, background 0.12s;
  }
  .promo-btn:hover { border-color: #4a90e2; background: #eaf3ff; }
  .promo-btn img { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
  <h1>ChessRPG</h1>
  <div class="meta">Click <em>Find Game</em>. You'll be paired with the next waiting player.</div>

  <div id="status">Idle.</div>
  <div>
    <button id="findBtn">Find Game</button>
    <button id="drawBtn" disabled>Offer Draw</button>
    <button id="resignBtn" disabled>Resign</button>
  </div>
  <div id="waiting" aria-live="polite">
    <div id="waitingPiece">&#9823;</div>
    <div id="waitingLabel">Searching for an opponent<span id="waitingDots"></span></div>
  </div>

  <div id="drawPrompt" style="display:none; margin-top:10px; padding:10px 12px; background:#fff7d6; border:1px solid #e6c84a; border-radius:6px;">
    <span id="drawPromptText">Opponent offers a draw.</span>
    <button id="drawAcceptBtn" style="margin-left:8px;">Accept</button>
    <button id="drawDeclineBtn">Decline</button>
  </div>

  <div id="setup">
    <h3>Customize Your Pieces</h3>
    <div class="setup-hint">Set each piece's level (1–99). HP and damage scale with level.</div>
    <div id="setupGrid" class="setup-grid"></div>
    <div class="setup-actions">
      <button id="resetLevelsBtn" type="button">Reset to 1</button>
      <span class="meta">Levels are saved in this browser.</span>
    </div>
  </div>

  <div id="board"></div>
  <div id="pieceTooltip" role="tooltip"></div>

  <div id="stats">
    <h3>Your Pieces</h3>
    <div id="statsList" class="stats-list"></div>
  </div>

  <div id="history"></div>

  <div id="promoModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Choose promotion">
    <div class="modal" style="padding:18px 22px; min-width:0;">
      <h2 style="font-size:16px; margin-bottom:10px;">Promote to:</h2>
      <div id="promoChoices" class="promo-choices"></div>
    </div>
  </div>

  <div id="endModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>
      <h2 id="modalTitle">Game Over</h2>
      <p class="modal-message" id="modalMessage"></p>
      <div class="modal-buttons">
        <button id="modalNewGameBtn">New Game</button>
        <button id="modalRematchBtn">Rematch</button>
      </div>
      <p class="modal-sub" id="modalSub"></p>
    </div>
  </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script type="module">
  import { Chess } from 'https://esm.sh/chess.js@1.0.0-beta.8';
  const socket = io();

  const statusEl = document.getElementById('status');
  const historyEl = document.getElementById('history');
  const findBtn = document.getElementById('findBtn');
  const resignBtn = document.getElementById('resignBtn');
  const drawBtn = document.getElementById('drawBtn');
  const drawPrompt = document.getElementById('drawPrompt');
  const drawPromptText = document.getElementById('drawPromptText');
  const drawAcceptBtn = document.getElementById('drawAcceptBtn');
  const drawDeclineBtn = document.getElementById('drawDeclineBtn');

  const waitingEl = document.getElementById('waiting');
  function showWaiting() { waitingEl.classList.add('on'); }
  function hideWaiting() { waitingEl.classList.remove('on'); }

  const endModal = document.getElementById('endModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalMessage = document.getElementById('modalMessage');
  const modalSub = document.getElementById('modalSub');
  const modalCloseBtn = document.getElementById('modalCloseBtn');
  const modalNewGameBtn = document.getElementById('modalNewGameBtn');
  const modalRematchBtn = document.getElementById('modalRematchBtn');

  let rematchRequestedByMe = false;

  function showEndModal(message) {
    modalMessage.textContent = message;
    modalSub.textContent = '';
    modalRematchBtn.disabled = false;
    modalRematchBtn.textContent = 'Rematch';
    rematchRequestedByMe = false;
    endModal.classList.add('on');
  }
  function hideEndModal() { endModal.classList.remove('on'); }

  const promoModal = document.getElementById('promoModal');
  const promoChoices = document.getElementById('promoChoices');
  let pendingPromotion = null;

  function showPromotionPicker(from, to, color) {
    pendingPromotion = { from, to };
    const c = color === 'w' ? 'w' : 'b';
    const pieces = [['q','Queen'], ['r','Rook'], ['b','Bishop'], ['n','Knight']];
    promoChoices.innerHTML = pieces.map(([p, label]) => `
      <button class="promo-btn" data-piece="${p}" aria-label="${label}" title="${label}">
        <img src="/img/chesspieces/wikipedia/${c}${p.toUpperCase()}.png" alt="${label}" />
      </button>
    `).join('');
    promoModal.classList.add('on');
  }

  function hidePromotionPicker() {
    pendingPromotion = null;
    promoModal.classList.remove('on');
  }

  promoChoices.addEventListener('click', (e) => {
    const btn = e.target.closest('.promo-btn');
    if (!btn || !pendingPromotion) return;
    const piece = btn.dataset.piece;
    const { from, to } = pendingPromotion;
    let move;
    try {
      move = chess.move({ from, to, promotion: piece });
    } catch (_) {
      move = null;
    }
    hidePromotionPicker();
    if (!move) {
      if (board) board.position(chess.fen());
      return;
    }
    socket.emit('move', { from, to, promotion: piece });
    if (board) board.position(chess.fen());
    renderHistory();
    updateStatus();
  });

  function hideDrawPrompt() { drawPrompt.style.display = 'none'; }
  function showDrawPrompt(text, withButtons) {
    drawPromptText.textContent = text;
    drawAcceptBtn.style.display = withButtons ? '' : 'none';
    drawDeclineBtn.style.display = withButtons ? '' : 'none';
    drawPrompt.style.display = '';
  }

  let chess = new Chess();
  let board = null;
  let myColor = null;
  let gameActive = false;
  let currentPieces = {};
  function refreshPreviewPieces() {
    if (!gameActive) currentPieces = buildPreviewPieces();
  }

  const PIECE_BASE = {
    p: { hp: 10, dmg: 10 },
    n: { hp: 10, dmg: 10 },
    b: { hp: 10, dmg: 10 },
    r: { hp: 10, dmg: 10 },
    q: { hp: 10, dmg: 10 },
    k: { hp: 10, dmg: 10 },
  };
  const SLOT_DEFS = [
    { slot: 'Ra', type: 'r', label: 'a1' },
    { slot: 'Nb', type: 'n', label: 'b1' },
    { slot: 'Bc', type: 'b', label: 'c1' },
    { slot: 'Q',  type: 'q', label: 'd1' },
    { slot: 'K',  type: 'k', label: 'e1' },
    { slot: 'Bf', type: 'b', label: 'f1' },
    { slot: 'Ng', type: 'n', label: 'g1' },
    { slot: 'Rh', type: 'r', label: 'h1' },
    { slot: 'Pa', type: 'p', label: 'a' },
    { slot: 'Pb', type: 'p', label: 'b' },
    { slot: 'Pc', type: 'p', label: 'c' },
    { slot: 'Pd', type: 'p', label: 'd' },
    { slot: 'Pe', type: 'p', label: 'e' },
    { slot: 'Pf', type: 'p', label: 'f' },
    { slot: 'Pg', type: 'p', label: 'g' },
    { slot: 'Ph', type: 'p', label: 'h' },
  ];
  const TYPE_NAME = { p: 'P', n: 'N', b: 'B', r: 'R', q: 'Q', k: 'K' };
  const LEVEL_STORAGE_KEY = 'chessrpg.levels.v1';

  function clampLevel(n) {
    const v = Math.floor(Number(n));
    if (!Number.isFinite(v) || v < 1) return 1;
    if (v > 99) return 99;
    return v;
  }

  function loadLevels() {
    try {
      const raw = localStorage.getItem(LEVEL_STORAGE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      const out = {};
      for (const { slot } of SLOT_DEFS) out[slot] = clampLevel(parsed?.[slot] ?? 1);
      return out;
    } catch (_) { return {}; }
  }

  function saveLevels(levels) {
    try { localStorage.setItem(LEVEL_STORAGE_KEY, JSON.stringify(levels)); } catch (_) {}
  }

  let myLevels = (() => {
    const stored = loadLevels();
    const out = {};
    for (const { slot } of SLOT_DEFS) out[slot] = stored[slot] ?? 1;
    return out;
  })();

  const SLOT_TO_W_SQUARE = {
    Ra:'a1', Nb:'b1', Bc:'c1', Q:'d1', K:'e1', Bf:'f1', Ng:'g1', Rh:'h1',
    Pa:'a2', Pb:'b2', Pc:'c2', Pd:'d2', Pe:'e2', Pf:'f2', Pg:'g2', Ph:'h2',
  };
  function buildPreviewPieces() {
    const pieces = {};
    for (const { slot, type } of SLOT_DEFS) {
      const wSq = SLOT_TO_W_SQUARE[slot];
      const bSq = wSq[0] + (wSq[1] === '1' ? '8' : '7');
      const lvl = clampLevel(myLevels[slot] ?? 1);
      const base = PIECE_BASE[type];
      pieces[wSq] = { id: 'w'+slot, type, color: 'w', level: lvl, hp: base.hp*lvl, dmg: base.dmg*lvl };
      pieces[bSq] = { id: 'b'+slot, type, color: 'b', level: lvl, hp: base.hp*lvl, dmg: base.dmg*lvl };
    }
    return pieces;
  }

  const setupGrid = document.getElementById('setupGrid');
  const setupSection = document.getElementById('setup');
  const resetLevelsBtn = document.getElementById('resetLevelsBtn');
  const statsSection = document.getElementById('stats');
  const statsListEl = document.getElementById('statsList');

  function renderSetup() {
    setupGrid.innerHTML = SLOT_DEFS.map(({ slot, type, label }) => `
      <div class="setup-cell">
        <img src="/img/chesspieces/wikipedia/w${TYPE_NAME[type]}.png" alt="${type}" />
        <div class="slot-label">${label}</div>
        <input type="number" min="1" max="99" data-slot="${slot}" value="${myLevels[slot] ?? 1}" />
      </div>
    `).join('');
  }

  setupGrid.addEventListener('input', (e) => {
    const t = e.target;
    if (!(t instanceof HTMLInputElement)) return;
    const slot = t.dataset.slot;
    if (!slot) return;
    myLevels[slot] = clampLevel(t.value);
    saveLevels(myLevels);
    refreshPreviewPieces();
  });
  setupGrid.addEventListener('change', (e) => {
    const t = e.target;
    if (!(t instanceof HTMLInputElement)) return;
    t.value = String(clampLevel(t.value));
  });
  resetLevelsBtn.addEventListener('click', () => {
    for (const { slot } of SLOT_DEFS) myLevels[slot] = 1;
    saveLevels(myLevels);
    renderSetup();
    refreshPreviewPieces();
  });
  renderSetup();
  refreshPreviewPieces();

  function showSetup(show) { setupSection.style.display = show ? '' : 'none'; }
  function showStats(show) { statsSection.classList.toggle('on', show); }

  const tooltipEl = document.getElementById('pieceTooltip');
  const TYPE_FULL = { p: 'Pawn', n: 'Knight', b: 'Bishop', r: 'Rook', q: 'Queen', k: 'King' };

  function squareFromElement(el) {
    if (!el) return null;
    const sq = el.closest('[data-square]');
    if (sq && /^[a-h][1-8]$/.test(sq.getAttribute('data-square'))) {
      return sq.getAttribute('data-square');
    }
    const cls = el.closest('[class]');
    if (cls) {
      const m = cls.className.match(/\bsquare-([a-h][1-8])\b/);
      if (m) return m[1];
    }
    return null;
  }

  function showTooltipFor(square, x, y) {
    const piece = currentPieces[square];
    if (!piece) { hideTooltip(); return; }
    const colorName = piece.color === 'w' ? 'White' : 'Black';
    tooltipEl.innerHTML = `
      <div class="tt-row"><strong>${colorName} ${TYPE_FULL[piece.type]}</strong> <span style="color:#aaa">${square}</span></div>
      <div class="tt-row">
        <span class="tt-lvl">Lv ${piece.level}</span>
        <span class="tt-hp">${piece.hp} HP</span>
        <span class="tt-dmg">${piece.dmg} DMG</span>
      </div>
    `;
    tooltipEl.classList.add('on');
    const pad = 14;
    const rect = tooltipEl.getBoundingClientRect();
    let left = x + pad;
    let top = y + pad;
    if (left + rect.width > window.innerWidth - 4) left = x - pad - rect.width;
    if (top + rect.height > window.innerHeight - 4) top = y - pad - rect.height;
    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
  }
  function hideTooltip() { tooltipEl.classList.remove('on'); }

  const boardEl = document.getElementById('board');
  let lastTooltipSquare = null;
  boardEl.addEventListener('mousemove', (e) => {
    const sq = squareFromElement(e.target);
    if (!sq || !currentPieces[sq]) {
      lastTooltipSquare = null;
      hideTooltip();
      return;
    }
    lastTooltipSquare = sq;
    showTooltipFor(sq, e.clientX, e.clientY);
  });
  boardEl.addEventListener('mouseleave', () => {
    lastTooltipSquare = null;
    hideTooltip();
  });

  function renderStats() {
    if (!myColor) { statsListEl.innerHTML = ''; return; }
    const mine = Object.entries(currentPieces)
      .filter(([, p]) => p.color === myColor)
      .sort(([sqA, a], [sqB, b]) => {
        const order = { k: 0, q: 1, r: 2, b: 3, n: 4, p: 5 };
        if (order[a.type] !== order[b.type]) return order[a.type] - order[b.type];
        return sqA.localeCompare(sqB);
      });
    statsListEl.innerHTML = mine.map(([sq, p]) => `
      <div class="row">
        <img src="/img/chesspieces/wikipedia/${p.color}${TYPE_NAME[p.type]}.png" alt="${p.type}" />
        <span class="sq">${sq}</span>
        <span class="lvl">L${p.level}</span>
        <span class="hp">${p.hp}hp</span>
        <span class="dmg">${p.dmg}dmg</span>
      </div>
    `).join('');
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function renderHistory() {
    const moves = chess.history();
    let out = '';
    for (let i = 0; i < moves.length; i += 2) {
      const num = (i / 2) + 1;
      out += `${num}. ${moves[i]}${moves[i + 1] ? ' ' + moves[i + 1] : ''}\n`;
    }
    historyEl.textContent = out;
  }

  function updateStatus() {
    if (!gameActive) return;
    const turn = chess.turn() === 'w' ? 'White' : 'Black';
    const me = myColor === 'w' ? 'White' : 'Black';
    let s = `You are ${me}. ${turn} to move.`;
    if (chess.inCheck()) s += ' Check!';
    setStatus(s);
  }

  function onDragStart(_source, piece) {
    if (!gameActive) return false;
    if (chess.isGameOver()) return false;
    if ((myColor === 'w' && piece.startsWith('b')) ||
        (myColor === 'b' && piece.startsWith('w'))) return false;
    if (chess.turn() !== myColor) return false;
  }

  function isPromotionMove(source, target) {
    const piece = chess.get(source);
    if (!piece || piece.type !== 'p') return false;
    if (piece.color === 'w' && target[1] !== '8') return false;
    if (piece.color === 'b' && target[1] !== '1') return false;
    return chess.moves({ square: source, verbose: true })
      .some(m => m.to === target && m.promotion);
  }

  function onDrop(source, target) {
    if (isPromotionMove(source, target)) {
      const color = chess.get(source).color;
      showPromotionPicker(source, target, color);
      return;
    }

    let move;
    try {
      move = chess.move({ from: source, to: target, promotion: 'q' });
    } catch (_) {
      move = null;
    }
    if (!move) return 'snapback';

    socket.emit('move', { from: source, to: target });
    renderHistory();
    updateStatus();
  }

  function onSnapEnd() {
    board.position(chess.fen());
  }

  function startBoard(fen, color) {
    myColor = color === 'white' ? 'w' : 'b';
    chess = new Chess(fen);
    if (board) board.destroy();
    board = Chessboard('board', {
      draggable: true,
      position: fen,
      orientation: color,
      pieceTheme: '/img/chesspieces/wikipedia/{piece}.png',
      onDragStart,
      onDrop,
      onSnapEnd,
    });
    gameActive = true;
    findBtn.disabled = true;
    resignBtn.disabled = false;
    drawBtn.disabled = false;
    drawBtn.textContent = 'Offer Draw';
    hideDrawPrompt();
    showSetup(false);
    showStats(true);
    renderStats();
    renderHistory();
    updateStatus();
  }

  function endGame(payload) {
    gameActive = false;
    findBtn.disabled = false;
    resignBtn.disabled = true;
    drawBtn.disabled = true;
    drawBtn.textContent = 'Offer Draw';
    hideDrawPrompt();
    hideWaiting();
    hidePromotionPicker();
    showSetup(true);
    showStats(false);
    refreshPreviewPieces();
    let msg;
    switch (payload.type) {
      case 'checkmate': msg = `Checkmate. ${payload.winner} wins.`; break;
      case 'resign':    msg = `${payload.winner} wins by resignation.`; break;
      case 'disconnect': msg = `Opponent disconnected. ${payload.winner} wins.`; break;
      case 'agreement': msg = 'Draw by agreement.'; break;
      case 'stalemate': msg = 'Draw by stalemate.'; break;
      case 'threefold': msg = 'Draw by threefold repetition.'; break;
      case 'insufficient': msg = 'Draw by insufficient material.'; break;
      case 'draw': msg = 'Draw.'; break;
      default: msg = 'Game over.';
    }
    setStatus(msg);
    showEndModal(msg);
    if (payload.type === 'disconnect') {
      modalRematchBtn.disabled = true;
      modalSub.textContent = 'Opponent left — rematch unavailable.';
    }
  }

  findBtn.addEventListener('click', () => {
    setStatus('Looking for an opponent…');
    findBtn.disabled = true;
    socket.emit('findGame', { levels: myLevels });
  });

  resignBtn.addEventListener('click', () => {
    if (!gameActive) return;
    if (!confirm('Resign this game?')) return;
    socket.emit('resign');
  });

  drawBtn.addEventListener('click', () => {
    if (!gameActive) return;
    socket.emit('offerDraw');
  });

  drawAcceptBtn.addEventListener('click', () => {
    socket.emit('acceptDraw');
    hideDrawPrompt();
  });

  drawDeclineBtn.addEventListener('click', () => {
    socket.emit('declineDraw');
    hideDrawPrompt();
  });

  socket.on('waiting', () => {
    setStatus('Waiting for an opponent to join…');
    showWaiting();
  });

  socket.on('paired', ({ gameId, color, fen, pieces }) => {
    hideWaiting();
    hideEndModal();
    setStatus(`Paired! Game ${gameId}. You are ${color}.`);
    currentPieces = pieces || {};
    startBoard(fen, color);
  });

  socket.on('moveMade', ({ from, to, promotion, fen, pieces }) => {
    if (pieces) currentPieces = pieces;
    // If the move was ours, chess.js already has it. Otherwise apply opponent's move.
    if (chess.fen() !== fen) {
      try {
        chess.move({ from, to, promotion: promotion || 'q' });
      } catch (_) {
        chess.load(fen);
      }
    }
    if (board) board.position(chess.fen());
    renderHistory();
    renderStats();
    updateStatus();
  });

  socket.on('illegalMove', ({ reason }) => {
    // Server rejected our move — re-sync from server-authoritative FEN if needed.
    setStatus(`Move rejected: ${reason}`);
  });

  socket.on('drawOfferSent', () => {
    drawBtn.disabled = true;
    drawBtn.textContent = 'Draw offered';
  });

  socket.on('drawOffered', () => {
    showDrawPrompt('Opponent offers a draw.', true);
  });

  socket.on('drawDeclined', () => {
    drawBtn.disabled = false;
    drawBtn.textContent = 'Offer Draw';
    showDrawPrompt('Draw offer declined.', false);
    setTimeout(hideDrawPrompt, 2500);
  });

  socket.on('drawOfferCleared', () => {
    drawBtn.disabled = false;
    drawBtn.textContent = 'Offer Draw';
    hideDrawPrompt();
  });

  socket.on('gameOver', endGame);

  modalCloseBtn.addEventListener('click', () => {
    hideEndModal();
    if (rematchRequestedByMe) {
      socket.emit('cancelRematch');
      rematchRequestedByMe = false;
    }
  });

  modalNewGameBtn.addEventListener('click', () => {
    hideEndModal();
    rematchRequestedByMe = false;
    setStatus('Looking for an opponent…');
    findBtn.disabled = true;
    showWaiting();
    socket.emit('findGame', { levels: myLevels });
  });

  modalRematchBtn.addEventListener('click', () => {
    if (modalRematchBtn.disabled) return;
    rematchRequestedByMe = true;
    modalRematchBtn.disabled = true;
    modalRematchBtn.textContent = 'Rematch requested';
    modalSub.textContent = 'Waiting for opponent…';
    socket.emit('requestRematch');
  });

  socket.on('rematchRequested', () => {
    if (!endModal.classList.contains('on')) return;
    modalSub.textContent = 'Opponent wants a rematch.';
    modalRematchBtn.textContent = 'Accept Rematch';
  });

  socket.on('rematchPending', () => {
    modalSub.textContent = 'Waiting for opponent…';
  });

  socket.on('rematchUnavailable', () => {
    if (!endModal.classList.contains('on')) return;
    modalRematchBtn.disabled = true;
    modalRematchBtn.textContent = 'Rematch';
    modalSub.textContent = 'Opponent left — rematch unavailable.';
    rematchRequestedByMe = false;
  });

  socket.on('disconnect', () => {
    setStatus('Disconnected from server.');
    gameActive = false;
    findBtn.disabled = false;
    resignBtn.disabled = true;
    drawBtn.disabled = true;
    hideWaiting();
  });

  // Render a non-interactive starting position immediately so the user sees
  // the board on load, before any pairing happens.
  board = Chessboard('board', {
    draggable: false,
    position: 'start',
    pieceTheme: '/img/chesspieces/wikipedia/{piece}.png',
  });
</script>
</body>
</html>
